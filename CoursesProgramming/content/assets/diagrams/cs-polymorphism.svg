<svg xmlns="http://www.w3.org/2000/svg" width="520" height="220" viewBox="0 0 520 220">
  <rect width="520" height="220" fill="#0d0d14"/>
  <text x="20" y="28" fill="#c9d1d9" font-family="monospace" font-size="16">C# Polymorphism</text>
  <rect x="20" y="50" width="200" height="60" fill="#1a1a24" stroke="#2a2a38" rx="8"/>
  <text x="30" y="75" fill="#9cdcfe" font-family="monospace" font-size="14">abstract Shape</text>
  <text x="30" y="95" fill="#c9d1d9" font-family="monospace" font-size="12">+ Area(): double</text>
  <rect x="260" y="40" width="220" height="60" fill="#1a1a24" stroke="#2a2a38" rx="8"/>
  <text x="270" y="65" fill="#9cdcfe" font-family="monospace" font-size="14">Circle : Shape</text>
  <text x="270" y="85" fill="#c9d1d9" font-family="monospace" font-size="12">override Area()</text>
  <rect x="260" y="120" width="220" height="60" fill="#1a1a24" stroke="#2a2a38" rx="8"/>
  <text x="270" y="145" fill="#9cdcfe" font-family="monospace" font-size="14">Rect : Shape</text>
  <text x="270" y="165" fill="#c9d1d9" font-family="monospace" font-size="12">override Area()</text>
  <line x1="220" y1="80" x2="260" y2="70" stroke="#7c5cfc" stroke-width="2"/>
  <line x1="220" y1="80" x2="260" y2="150" stroke="#7c5cfc" stroke-width="2"/>
</svg>